<style>
        body {

<body class="font-body-md text-on-surface min-h-screen flex flex-col items-center justify-center p-container-margin overflow-x-hidden">
<!-- Onboarding Container -->
<main class="w-full max-w-[400px] flex flex-col items-center justify-between min-h-[751px] text-center relative">
<!-- Top Logo Anchor -->
<div class="mb-xl animate-fade-in">
<h1 class="font-display text-display text-primary tracking-tighter">LadyBug</h1>
</div>
<!-- Premium Illustration Section -->
<div class="relative w-full aspect-square max-w-[320px] flex items-center justify-center mb-xl">
<!-- Background Decorative Circles -->
<div class="absolute inset-0 bg-primary/5 rounded-full scale-110 blur-3xl -z-10"></div>
<div class="relative w-full h-full glass-card rounded-[40px] shadow-sm flex items-center justify-center overflow-hidden">
<img alt="Premium LadyBug Illustration" class="w-full h-full object-cover transform hover:scale-105 transition-transform duration-700 ease-out" data-alt="A sophisticated 3D digital illustration in a high-key minimalist style. A friendly red and black ladybug companion with large expressive eyes is carefully tending to a small, bright green sprout emerging from rich soil. The setting is a clean, airy room with soft morning sunlight casting gentle shadows. The color palette features warm creams, pristine whites, and vibrant primary red accents, creating a nurturing and premium academic atmosphere." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAq7PCC8bXaDfXROfvY2ShjgQb-Ml2YjLheBz1hxFfS39DtOi7DkBzOLPTYJNMa-bb5ijb_cqNL8EBTMKRxv8duqssPQc6n7BcQ34fpbBLHbYW8HGZgmc9yt8fv8f0E62QDWBmR6XW5jOazzQCkX-HScliwu1LURC65Zk83_9uaOnpTovGZfuQE0pchiwKi-HX1UFI9cyZCwWqLzEyT2MwAPmdG2JZNSFAoTWRdkGLve1UXianDIv0Nq3LEOKHmOk_7MpHcabcFshrR"/>
</div>
<!-- Floating Achievement Badge (Micro-interaction element) -->
<div class="absolute -bottom-4 -right-4 bg-surface-container-highest p-sm rounded-xl shadow-lg border border-black/5 animate-bounce" style="animation-duration: 3s;">
<span class="material-symbols-outlined text-primary text-[32px]">emoji_events</span>
</div>
</div>
<!-- Content Section -->
<div class="space-y-md">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">
                Small Steps. <br/>
<span class="text-primary">Big Success.</span>
</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[280px] mx-auto leading-relaxed">
                The premium companion for your academic journey.
            </p>
</div>
<!-- Bottom Action Bar -->
<div class="w-full mt-xxl space-y-md">
<!-- Progress Indicator Dots -->
<div class="flex justify-center gap-2 mb-md">
<div class="h-1.5 w-6 rounded-full bg-primary transition-all duration-300"></div>
<div class="h-1.5 w-2 rounded-full bg-outline-variant"></div>
<div class="h-1.5 w-2 rounded-full bg-outline-variant"></div>
</div>
<button class="group relative w-full bg-primary text-on-primary py-lg rounded-xl font-headline-sm text-headline-sm shadow-xl shadow-primary/20 hover:scale-[0.98] active:scale-95 transition-all duration-200 overflow-hidden" id="nextBtn">
<span class="relative z-10">Next</span>
<div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
</button>
<button class="w-full py-md text-on-surface-variant font-label-lg text-label-lg hover:text-primary transition-colors">
                Skip to Dashboard
            </button>
</div>
</main>
<!-- Decorative Mascot Line Art (Faint pattern) -->
<div class="fixed bottom-[-50px] right-[-50px] opacity-[0.03] pointer-events-none -rotate-12">
<span class="material-symbols-outlined text-[300px]">pest_control_rodent</span>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('nextBtn');
            
            // Subtle hover parallax for the illustration
            const card = document.querySelector('.glass-card');
            document.addEventListener('mousemove', (e) => {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });

            btn.addEventListener('click', () => {
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
                setTimeout(() => {
                    // Simulation of transition
                    document.body.classList.add('opacity-0');
                    document.body.style.transition = 'opacity 0.5s ease-out';
                }, 300);
            });
        });
    </script>
